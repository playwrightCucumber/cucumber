## Navigation Flow
1. Login (support@chronicle.rip)
2. Select AUS Server
3. Search cemetery in sidebar
4. Click cemetery card
5. Click "More" button (three dots) in cemetery admin page
6. Click "Import" from dropdown menu
7. URL changes to: .../chronicle-admin/{cemetery_slug}/import-data

## Key Selectors
- Import button: `button:has-text("Import")`
- Back button: `button:has-text("Back to the Cemetery")`
- More menu: `button[aria-label="More options"]`
- Import menu item: `menuitem` with text "Import"
- Page title: `h1:has-text("Import data")`
- Category count: `h3:has-text("CategoryName") + h4`
